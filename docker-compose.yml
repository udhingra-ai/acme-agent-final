services:
  nginx:
    build: ./nginx
    container_name: acme-nginx
    ports:
      - "443:443"
    depends_on:
      app:
        condition: service_started

  app:
    build: ./app
    container_name: acme-app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./evals:/evals:ro

  postgres:
    image: postgres:16
    container_name: acme-postgres
    environment:
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
      POSTGRES_DB: acme_ops
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme_ops"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: acme-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: acme-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/acme/.well-known/openid-configuration || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  mcp-server:
    build: ./mcp_server
    container_name: acme-mcp
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/tools || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
