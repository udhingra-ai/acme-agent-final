server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Docker internal DNS — defers upstream resolution to request time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Match LLM planner latency
    proxy_read_timeout  60s;
    proxy_send_timeout  60s;

    # API routes — proxy to FastAPI backend
    location ~ ^/(query|auth|customers|issues|evals|health) {
        set $backend http://acme-app:8000;
        proxy_pass          $backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # SSE support for /evals/run streaming
        proxy_buffering     off;
        proxy_cache         off;
    }

    # React SPA — serve static files; fall back to index.html for client-side routing
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
