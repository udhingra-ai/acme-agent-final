# Rate limiting zones — defined at http context level (included by main nginx.conf)
# auth_limit: strict — prevents credential brute force (5 req/min, burst 3)
# api_limit:  generous — allows eval suite to run without delays (10 req/s, burst 30)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=10r/s;

# Horizontal scaling: consistent hash on X-Forwarded-For pins SSE connections
# to the same upstream pod per real client IP (not per gateway NAT address).
# ip_hash uses the last-hop IP and buckets by /24 — clients behind a shared
# NAT all land on the same pod. $http_x_forwarded_for gives per-client routing
# when nginx sits behind an edge proxy that sets the header. With no proxy it
# falls back to the direct IP, which is fine for single-pod setups.
# Add more server entries here (or use DNS-resolved service names in k8s)
# to scale out — each client's stream stays on one pod for the duration.
upstream acme_app {
    hash $http_x_forwarded_for consistent;
    server acme-app:8000;
    # server acme-app-2:8000;  # add additional pods here
    keepalive 32;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Docker internal DNS — defers upstream resolution to request time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Match LLM planner latency + SSE stream duration
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;

    # Auth endpoint — strict rate limit to prevent credential brute force
    location /auth {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass          http://acme_app;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
    }

    # Other API routes — generous limit covers eval suite (14 sequential requests)
    location ~ ^/(query|customers|issues|evals|health|alerts|briefings|memory|cache|audit) {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass          http://acme_app;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";

        # SSE support — disable buffering so tokens stream immediately to client
        proxy_buffering     off;
        proxy_cache         off;
    }

    # React SPA — serve static files; fall back to index.html for client-side routing
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
