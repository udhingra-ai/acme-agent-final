# Rate limiting zones — defined at http context level (included by main nginx.conf)
# auth_limit: strict — prevents credential brute force (5 req/min, burst 3)
# api_limit:  generous — allows eval suite to run without delays (10 req/s, burst 30)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=10r/s;

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Docker internal DNS — defers upstream resolution to request time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Match LLM planner latency
    proxy_read_timeout  60s;
    proxy_send_timeout  60s;

    # Auth endpoint — strict rate limit to prevent credential brute force
    location /auth {
        limit_req zone=auth_limit burst=3 nodelay;
        set $backend http://acme-app:8000;
        proxy_pass          $backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # Other API routes — generous limit covers eval suite (14 sequential requests)
    location ~ ^/(query|customers|issues|evals|health) {
        limit_req zone=api_limit burst=30 nodelay;
        set $backend http://acme-app:8000;
        proxy_pass          $backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # SSE support for /evals/run streaming
        proxy_buffering     off;
        proxy_cache         off;
    }

    # React SPA — serve static files; fall back to index.html for client-side routing
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
