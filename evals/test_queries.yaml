# RLS cross-ownership denial

- id: T17
  query: "Show me open issues for Harborview Credit Union"
  role: "sales_user"
  stream_user: "alice.sales"
  expected_tools: ["get_customer_profile", "get_open_issues"]
  stream_expected_tools: ["get_customer_profile", "get_open_issues"]
  expect_status: 200
  notes: "RLS: alice.sales queries james.whitfield's customer — profile returned, issues=[] (account_owner filter). Proves RLS silently scopes rows without a 403."
